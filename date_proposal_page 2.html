<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Question For Uru ❤️</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}
.container{
    background:white;
    width:90%;
    max-width:550px;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}
h1{
    color:#ff4d6d;
    margin-bottom:20px;
}
p{
    margin-bottom:20px;
    font-size:18px;
    line-height:1.5;
}
button{
    border:none;
    cursor:pointer;
    border-radius:30px;
    padding:12px 24px;
    font-size:18px;
}
#yesBtn{
    background:#ff4d6d;
    color:white;
}
#noBtn{
    background:#ddd;
    position:absolute;
}
.heart{
    position:absolute;
    font-size:25px;
    animation:float 4s linear infinite;
}
@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-800px);
        opacity:0;
    }
}
</style>
</head>
<body>
<div class="container">
<div id="question">
<h1>❤️ Hi Uru ❤️</h1>
<p>
Every conversation with you makes my day better.
You are someone very special to me and I have something important to ask...
</p>
<h2 style="margin-bottom:30px;">
Will you go on a date with me? 🌹
</h2>
<div style="position:relative;height:100px;">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">NO 😅</button>
</div>
</div>
</div>
<script>
let noClickCount = 0;
const noBtn = document.getElementById("noBtn");
function moveButton(){
    noClickCount++;
    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 100;
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";
    if(noClickCount >= 8){
        noBtn.innerHTML = "Just click YES 😍";
    }
}
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
document.getElementById("yesBtn").addEventListener("click", () => {
    document.getElementById("question").innerHTML = `
    <h1>❤️ Thank You Uru ❤️</h1>
    <p>
    Please select a date and time that works best for you 🌹
    </p>
    <br>
    <input type="date" id="datePicker"
    style="padding:10px;font-size:18px;">
    <br><br>
    <input type="time" id="timePicker"
    style="padding:10px;font-size:18px;">
    <br><br>
    <button onclick="confirmDate()"
    style="background:#ff4d6d;color:white;">
    Confirm ❤️
    </button>
    `;
});
function confirmDate(){
    const date = document.getElementById("datePicker").value;
    const time = document.getElementById("timePicker").value;
    if(!date){
        alert("Please select a date ❤️");
        return;
    }
    createHearts();
    const message =
`Hi Vilesh ❤️
I accepted your invitation.
My preferred date is:
📅 ${date}
⏰ ${time}
Looking forward to meeting you 🌹
- Uru`;
    const whatsappURL =
`https://wa.me/918511489818?text=${encodeURIComponent(message)}`;
    document.getElementById("question").innerHTML = `
        <h1>🎉 Date Confirmed 🎉</h1>
        <p>
        Thank you Uru ❤️<br><br>
        Your selection has been prepared.
        </p>
        <h2>See you soon 🌹</h2>
    `;
    setTimeout(() => {
        window.location.href = whatsappURL;
    },1500);
}
function createHearts(){
    const interval = setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.bottom = "-20px";
        document.body.appendChild(heart);
        setTimeout(() => {
            heart.remove();
        },4000);
    },200);
    setTimeout(() => {
        clearInterval(interval);
    },5000);
}
</script>
</body>
</html>
