<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Question ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center}
.container{text-align:center;background:white;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.2);max-width:500px;width:90%}
h1{color:#ff4d6d;margin-bottom:20px}
p{font-size:18px;margin-bottom:25px}
.buttons{position:relative;height:80px}
button{border:none;padding:12px 24px;font-size:18px;border-radius:30px;cursor:pointer;transition:.3s}
#yesBtn{background:#ff4d6d;color:white;margin-right:10px}
#noBtn{background:#ddd;position:absolute}
.heart{position:absolute;color:red;animation:float 4s linear infinite}
@keyframes float{from{transform:translateY(0);opacity:1}to{transform:translateY(-800px);opacity:0}}
#success{display:none}
.success-text{font-size:28px;color:#ff4d6d;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<div id="question">
<h1>❤️ Hi [Her Name] ❤️</h1>
<p>Every conversation with you makes my day better. I have something special to ask...</p>
<h2 style="margin-bottom:25px;">Will you go on a date with me? 🌹</h2>
<div class="buttons">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">NO 😅</button>
</div>
</div>
<div id="success">
<h1>🎉 YAYYYY! 🎉</h1>
<div class="success-text">I knew you'd say YES! ❤️</div>
<br>
<p>Looking forward to making beautiful memories together 🌹</p>
</div>
</div>
<script>
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
 const maxX=window.innerWidth-120;
 const maxY=window.innerHeight-80;
 noBtn.style.left=Math.random()*maxX+"px";
 noBtn.style.top=Math.random()*maxY+"px";
});
document.getElementById("yesBtn").addEventListener("click",()=>{
 document.getElementById("question").style.display="none";
 document.getElementById("success").style.display="block";
 createHearts();
});
function createHearts(){
 setInterval(()=>{
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.bottom="-20px";
  heart.style.fontSize=(20+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),4000);
 },200);
}
</script>
</body>
</html>
